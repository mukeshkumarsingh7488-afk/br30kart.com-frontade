    <div id="commonHeader"></div>
    <div class="container">
      <h2 class="login-heading">Login</h2>
      <form id="loginForm" onsubmit="handleLogin(event)">
        <label>Email Address</label>
        <div class="input-box">
          <input id="email" name="email" type="email" placeholder="example@mail.com" autocomplete="username" required />
        </div>
        <label>Password</label>
        <div class="input-box">
          <input id="password" name="password" type="password" placeholder="••••••••" autocomplete="current-password" required />
          <span class="toggle-btn" id="toggleBtn" onclick="togglePassword()" style="cursor: pointer">👁️</span>
        </div>
        <button type="submit" id="loginBtn">Login to Account</button>
      </form>
      <div class="links">
        <a href="forgot.html">Forgot Password?</a>
        <a href="register.html">Register</a>
      </div>
    </div>
