    <style>
      body {
        background: #050505;
        color: #ffffff;
        font-family: "Poppins", sans-serif;
        margin: 0;
        padding: 20px;
        text-align: center;
      }

      .verify-card {
        max-width: 500px;
        margin: 40px auto;
        background: #111;
        padding: 30px;
        border-radius: 25px;
        border: 2px solid #00ff88;
        box-shadow: 0 0 30px rgba(0, 255, 136, 0.1);
      }

      h2 {
        color: #00ff88;
        text-transform: uppercase;
        letter-spacing: 2px;
      }

      /* Input & Button */
      input {
        width: 90%;
        padding: 15px;
        border-radius: 12px;
        border: 1px solid #333;
        background: #000;
        color: #00ff88;
        margin-bottom: 15px;
        font-weight: bold;
        text-align: center;
      }

      button {
        width: 100%;
        padding: 15px;
        background: #00ff88;
        color: #000;
        font-weight: 900;
        border: none;
        border-radius: 12px;
        cursor: pointer;
        text-transform: uppercase;
        transition: 0.3s;
      }

      button:hover {
        box-shadow: 0 0 20px rgba(0, 255, 136, 0.4);
        transform: scale(1.02);
      }

      /* 📸 Camera Section */
      #reader {
        width: 100%;
        border-radius: 15px;
        overflow: hidden;
        margin-top: 20px;
        border: 1px dashed #00ff88;
      }

      /* ✅ Result Section */
      #result-box {
        display: none;
        margin-top: 25px;
        padding: 20px;
        border-radius: 15px;
        border-left: 5px solid #00ff88;
        background: rgba(0, 255, 136, 0.05);
        text-align: left;
        animation: fadeIn 0.5s ease;
      }

      .status-tag {
        background: #00ff88;
        color: #000;
        padding: 5px 10px;
        border-radius: 5px;
        font-weight: 900;
        font-size: 12px;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }

        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
    </style>
  </head>

  <body>
    <!-- Google Tag Manager (noscript) -->
    <noscript>
      <iframe
        src="https://www.googletagmanager.com/ns.html?id=GTM-TT7SLZ4L"
        height="0"
        width="0"
        style="display: none; visibility: hidden"
      ></iframe>
    </noscript>
    <!-- End Google Tag Manager (noscript) -->
    <div class="verify-card">
      <img
        src="../images/BR30™  LOGO.jpeg"
        alt="BR30"
        width="80"
        style="margin-bottom: 10px"
      />

      <h2>🛡️ BR30 VERIFICATION</h2>
      <p style="color: #94a3b8; font-size: 13px">
        Official MSME Registered Academy Verification System
      </p>

      <!-- ⌨️ SEARCH BOX -->
      <input
        type="text"
        id="certInput"
        placeholder="ENTER CERTIFICATE NO BR30-123456"
      />
      <button onclick="verifyCert()">VERIFY CERTIFICATE ✅</button>

      <div style="margin: 25px 0; color: #333; font-weight: bold">
        -- OR SCAN QR CODE --
      </div>

      <!-- 🎥 CAMERA SCANNER -->
      <div id="reader"></div>

      <!-- 🏆 VERIFICATION RESULT -->
      <div id="result-box">
        <span class="status-tag">OFFICIALLY VERIFIED✅</span>
        <h3 id="res-name" style="margin: 15px 0 5px 0; color: #00ff88"></h3>
        <p
          id="res-course"
          style="margin: 0; color: #cbd5e1; font-size: 14px"
        ></p>
        <p
          id="res-date"
          style="margin-top: 10px; color: #94a3b8; font-size: 12px"
        ></p>
      </div>
    </div>

    <script src="../js/config.js"></script>
    <script>
      // 🎥 1. Camera Scanner Logic (Same as before)
      const html5QrCode = new Html5Qrcode("reader");
      const config = { fps: 10, qrbox: { width: 250, height: 250 } };

      html5QrCode
        .start({ facingMode: "environment" }, config, (decodedText) => {
          let id = decodedText;
          if (decodedText.includes("id=")) {
            id = decodedText.split("id=")[1];
          }
          document.getElementById("certInput").value = id;
          verifyCert();
        })
        .catch((err) => console.warn("Camera access denied or error:", err));

      // 🔍 2. Verification API Logic
      async function verifyCert() {
        const certId = document.getElementById("certInput").value.trim();
        const resBox = document.getElementById("result-box");

        if (!certId) {
          return Swal.fire({
            icon: "warning",
            title: "ID Required",
            text: "Please enter or scan a Certificate ID to verify.",
            background: "#111827",
            color: "#fff",
          });
        }

        try {
          // Show Processing State
          Swal.fire({
            title: "Authenticating...",
            text: "Verifying certificate credentials with BR30 database.",
            allowOutsideClick: false,
            background: "#111827",
            color: "#fff",
            didOpen: () => {
              Swal.showLoading();
            },
          });

          // 🔥 FIXED URL LINE: 'window.API_BASE_URL' ki jagah 'CONFIG.BASE_API_URL' use kiya hai
          // Kyunki CONFIG.BASE_API_URL mein pehle se hi "/api" included hai.
          const res = await fetch(
            `${CONFIG.BASE_API_URL}/auth/verify-certificate/${certId}`,
          );

          const data = await res.json();

          if (data.success) {
            Swal.close();

            resBox.style.display = "block";
            document.getElementById("res-name").innerText =
              data.studentName.toUpperCase();
            document.getElementById("res-course").innerText = data.course;

            // 📅 3. DATE FORMATTING
            const dateObj = new Date(data.issueDate);
            const formattedDate = isNaN(dateObj)
              ? new Date().toLocaleDateString("en-IN")
              : dateObj.toLocaleDateString("en-IN", {
                  day: "numeric",
                  month: "long",
                  year: "numeric",
                });

            document.getElementById("res-date").innerText =
              "Issued on: " + formattedDate;

            // 📥 4. DYNAMIC DOWNLOAD BUTTON
            const oldBtn = document.getElementById("dl-btn");
            if (oldBtn) oldBtn.remove();

            const dlBtn = document.createElement("button");
            dlBtn.id = "dl-btn";
            dlBtn.innerHTML = "DOWNLOAD CERTIFICATE 📥";
            dlBtn.style.cssText =
              "width:100%; padding:14px; margin-top:20px; background:#D4AF37; color:#000; border:none; border-radius:12px; font-weight:900; cursor:pointer; text-transform:uppercase; letter-spacing:1px; transition: 0.3s; box-shadow: 0 4px 15px rgba(212, 175, 55, 0.2);";

            dlBtn.onmouseover = () => (dlBtn.style.background = "#e5c05b");
            dlBtn.onmouseout = () => (dlBtn.style.background = "#D4AF37");
            dlBtn.onclick = () => window.open(data.downloadUrl, "_blank");

            resBox.appendChild(dlBtn);
            resBox.scrollIntoView({ behavior: "smooth" });

            Swal.fire({
              icon: "success",
              title: "Verified Successfully!",
              timer: 2000,
              showConfirmButton: false,
              toast: true,
              position: "top-end",
              background: "#111827",
              color: "#fff",
            });
          } else {
            resBox.style.display = "none";
            Swal.fire({
              icon: "error",
              title: "Invalid Certificate",
              text: "This Certificate ID does not exist in our records.",
              background: "#111827",
              color: "#fff",
            });
          }
        } catch (err) {
          console.error("Verification Error:", err);
          Swal.fire({
            icon: "error",
            title: "Server Error",
            text: "Unable to connect. Please check if your API server is running.",
            background: "#111827",
            color: "#fff",
          });
        }
      }

      // 5. Auto-load from URL
      window.onload = () => {
        const urlParams = new URLSearchParams(window.location.search);
        const id = urlParams.get("id");
        if (id) {
          document.getElementById("certInput").value = id;
          verifyCert();
        }
      };
    </script>

    <script src="/js/security.js"></script>
  </body>
