    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet" />

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11" defer></script>
    <link rel="stylesheet" href="../assets/css/s-bestseller.css" />
    <link rel="stylesheet" href="/assets/css/common.css" />
  </head>
  <body>
    <!-- Google Tag Manager (noscript) -->
    <noscript>
      <iframe src="https://www.googletagmanager.com/ns.html?id=GTM-5CDWCQ5S" height="0" width="0" style="display: none; visibility: hidden"></iframe>
    </noscript>
    <!-- End Google Tag Manager (noscript) -->
    <div class="p-6">
      <div class="flex justify-between items-center mb-8">
        <div class="flex items-center gap-4">
          <a href="/seller-analytics" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg text-xs font-bold transition">BACK TO Dashboard</a>
          <h1 class="text-2xl font-black italic">
            Best
            <span class="text-blue-500">Sellers</span>
          </h1>
        </div>
        <div class="absolute left-1/2 -translate-x-1/2 flex flex-col items-center justify-center">
          <img src="https://i.ibb.co/KxnQc4gx/BR30-LOGO1.png" alt="Logo" class="h-10 w-auto object-contain mb-1" />
          <span class="text-sm font-black tracking-widest text-white uppercase leading-none">
            BR30
            <span class="text-blue-500">KART</span>
          </span>
        </div>
        <div class="flex items-center gap-3">
          <div class="relative">
            <i class="fas fa-search absolute left-3 top-3 text-gray-500"></i>
            <input type="text" id="courseSearch" oninput="applyFilters()" placeholder="Search Course Name..." class="bg-[#0d1117] border border-gray-800 text-white pl-10 pr-4 py-2 rounded-lg text-sm w-64 outline-none focus:border-blue-500" />
          </div>
          <button onclick="resetFilters()" class="bg-[#2d333b] hover:bg-[#3d444d] text-white p-2.5 rounded-lg transition-all border border-gray-700 flex items-center justify-center w-10 h-10">
            <i class="fas fa-sync-alt text-sm"></i>
          </button>
        </div>
      </div>
      <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
        <div class="stat-card p-4 border-l-4 border-l-blue-500">
          <p class="text-gray-500 text-[9px] font-bold uppercase">Best Seller</p>
          <h2 class="text-2xl font-black" id="bestSellerAmount">₹0</h2>
        </div>
        <div class="stat-card p-4 border-l-4 border-l-green-500">
          <p class="text-gray-500 text-[9px] font-bold uppercase">2nd Seller</p>
          <h2 class="text-2xl font-black text-green-500" id="secondSellerAmount">₹0</h2>
        </div>
        <div class="stat-card p-4 border-l-4 border-l-yellow-500">
          <p class="text-gray-500 text-[9px] font-bold uppercase">3rd Seller</p>
          <h2 class="text-2xl font-black text-yellow-500" id="thirdSellerAmount">₹0</h2>
        </div>
        <div class="stat-card p-4 border-l-4 border-l-red-500">
          <p class="text-gray-500 text-[9px] font-bold uppercase">Low Seller</p>
          <h2 class="text-2xl font-black text-red-500" id="lowSellerAmount">₹0</h2>
        </div>
      </div>
      <div class="bg-[#0f1216] p-4 rounded-xl mb-6 flex items-center justify-center gap-4 border border-[#1f2937]">
        <div class="relative flex items-center">
          <input type="date" id="startDate" class="date-input" />
        </div>
        <span class="text-gray-600 font-bold">to</span>
        <div class="relative flex items-center">
          <input type="date" id="endDate" class="date-input" />
        </div>
        <button onclick="applyFilters()" class="bg-green-600 hover:bg-green-700 text-white px-6 py-2 rounded-lg font-bold text-xs uppercase transition">Apply</button>
        <button onclick="resetFilters()" class="bg-gray-700 hover:bg-gray-600 text-white px-3 py-2 rounded-lg transition">
          <i class="fas fa-sync-alt"></i>
        </button>
        <button onclick="exportToPDF()" class="bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded-lg font-bold text-xs flex items-center gap-2 transition">
          <i class="fas fa-file-pdf"></i>
          PDF
        </button>
        <button onclick="window.exportToCSV()" class="bg-green-600 hover:bg-green-700 text-white px-6 py-2 rounded-lg font-bold text-xs flex items-center gap-2 shadow-lg">
          <i class="fas fa-file-pdf"></i>
          CSV
        </button>
      </div>
      <div class="table-container">
        <table class="w-full text-left">
          <thead class="sticky top-0 bg-[#161b22] text-gray-400 text-[10px] font-bold uppercase">
            <tr>
              <th class="px-6 py-4 text-center">SALE DATE</th>
              <th class="px-6 py-4 text-center">COURSE TITLE</th>
              <th class="px-6 py-4 text-center">AMOUNT (INR)</th>
              <th class="px-6 py-4 text-center">STUDENT NAME</th>
              <th class="px-6 py-4 text-center">STATUS</th>
            </tr>
          </thead>
          <tbody id="bestsellerTableBody" class="divide-y divide-[#1f2937]"></tbody>
        </table>
      </div>
    </div>
    <script src="../js/config.js"></script>
    <script src="../js/bestseller.js"></script>
  </body>
</html>
