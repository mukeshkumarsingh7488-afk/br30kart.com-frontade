<style>
  /* ============================================================
     GLOBAL STYLES (Premium Dark Theme)
     ============================================================ */
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Poppins", sans-serif;
  }

  body {
    background-color: #050505;
    color: #ffffff;
    min-height: 100vh;
    padding-bottom: 50px;
  }

  /* HEADER SECTION */
  header {
    background: #0f172a;
    padding: 15px 5%;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid #1e293b;
    position: sticky;
    top: 0;
    z-index: 1000;
  }

  .logo-title {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo {
    width: 45px;
    height: 45px;
    border-radius: 8px;
  }

.welcome-title h1 {
    font-size: 1.2rem;
    background: linear-gradient(90deg, #ffffff, #a020f0);
    
    /* Chrome, Safari, Edge */
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    
    /* Standard property for Firefox and others */
    background-clip: text;
    color: transparent; /* Fallback */
    
    display: inline-block; /* Zaroori hai taki gradient text ki width pe hi rahe */
  }


  nav a {
    color: #cbd5e1;
    text-decoration: none;
    margin-left: 20px;
    font-size: 14px;
    font-weight: 500;
    transition: 0.3s;
  }

  nav a:hover {
    color: #a020f0;
  }

  /* =========================================
       MY COURSE GRID LOGIC (MAIN FIX)
     ========================================= */
  
  /* Ye container hai jiske andar JS data dalega */
  #courseContent {
    max-width: 1300px; /* 3-3 cards ke liye perfect width */
    margin: 40px auto;
    padding: 0 20px;
  }

  .my-library-header {
    text-align: center;
    margin-bottom: 40px;
  }

  /* 🔥 GRID MAGIC: Isse 3-3 cards ki line banegi */
  .courses-grid {
    display: grid;
    /* Desktop: 3 cards, Tablet: 2 cards, Mobile: 1 card */
    grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
    gap: 30px;
    justify-content: center; /* Items ko center karne ke liye */
  }

  /* Single Card ko center karne ke liye extra logic */
  .courses-grid:has(> :last-child:nth-child(1)) {
     display: flex;
     justify-content: center;
  }

  /* Individual Course Card Design */
  .course-card {
    background: #0f172a;
    border-radius: 20px;
    border: 1px solid #1e293b;
    overflow: hidden;
    transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    display: flex;
    flex-direction: column;
    height: 100%;
    max-width: 400px; /* Taki card zyada bada na ho jaye */
    margin: 0 auto;   /* Card ko grid cell ke beech mein rakhne ke liye */
  }

  .course-card:hover {
    border-color: #a020f0;
    transform: translateY(-10px);
    box-shadow: 0 20px 40px rgba(160, 32, 240, 0.15);
  }

  /* Image Container */
  .thumb-container {
    position: relative;
    width: 100%;
    padding-top: 56.25%; /* 16:9 Aspect Ratio */
    overflow: hidden;
  }

  .course-card img {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: 0.5s;
  }

  .card-body {
    padding: 20px;
    display: flex;
    flex-direction: column;
    flex-grow: 1;
  }

  .course-card h3 {
    color: #f8fafc;
    font-size: 1.2rem;
    margin-bottom: 10px;
    font-weight: 700;
  }

  .course-card p {
    color: #94a3b8;
    font-size: 0.9rem;
    line-height: 1.6;
    margin-bottom: 20px;
    flex-grow: 1;
  }

  /* Watch Button */
  .watch-btn {
    width: 100%;
    background: linear-gradient(135deg, #a020f0, #7b1fa2);
    color: #fff;
    border: none;
    padding: 14px;
    border-radius: 12px;
    cursor: pointer;
    font-weight: 700;
    font-size: 15px;
    transition: 0.3s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }

  .watch-btn:hover {
    transform: scale(1.02);
    box-shadow: 0 10px 20px rgba(160, 32, 240, 0.4);
  }

  /* Empty State Styling */
  .empty-state {
    padding: 60px 20px;
    background: #0f172a;
    border-radius: 24px;
    border: 1px dashed #334155;
    max-width: 500px;
    margin: 50px auto;
  }

  /* =========================================
       RESPONSIVE ADJUSTMENTS
     ========================================= */
  @media (max-width: 768px) {
    header {
      flex-direction: column;
      gap: 15px;
      text-align: center;
    }
    
    .welcome-title h1 {
      font-size: 1rem;
    }

    nav {
      width: 100%;
      display: flex;
      justify-content: space-around;
      border-top: 1px solid #1e293b;
      padding-top: 10px;
    }

    nav a { margin: 0; }

    .courses-grid {
      grid-template-columns: 1fr; /* Mobile par 1 card */
      gap: 20px;
    }
  }
</style>

      <iframe
        src="https://www.googletagmanager.com/ns.html?id=GTM-TT7SLZ4L"

      <div class="logo-title">
        <img src="../images/BR30™  LOGO.jpeg" alt="logo" class="logo" />
        <h1>BR30ᴛʀᴀᴅᴇʀ</h1>
      </div>
      <div class="welcome-title">
        <h1>Welcome Trader</h1>
      </div>

        <a href="../index.html">Home</a>

    <div id="courseContent">
      <!-- JS injection happens here -->
    </div>
<script src="../js/config.js"></script>
<script>
const courseDiv = document.getElementById("courseContent");
const token = localStorage.getItem("token");

// 🔥 Dynamic Base URL
const baseUrl = window.API_BASE_URL || "https://br30kart-api.onrender.com";
const API = baseUrl + "/api/products";

document.addEventListener("DOMContentLoaded", fetchMyCourses);

async function fetchMyCourses() {
  try {
    console.log("%c[FETCH] Accessing your premium library...", "color: #00ff88; font-weight: bold;");

    courseDiv.innerHTML = `
      <div class="loader" style="text-align:center; padding:60px;">
        <div style="font-size: 30px; margin-bottom: 10px;">⏳</div>
        <p style="color: #94a3b8;">Loading your premium library. Please wait...</p>
      </div>
    `;

    const res = await fetch(`${API}/my-courses`, {
      method: "GET",
      headers: {
        "x-auth-token": token,
      },
    });

    // 🔐 Auth Fail (SweetAlert Integration)
    if (res.status === 401 || res.status === 403) {
      await Swal.fire({
        icon: 'error',
        title: 'Session Expired',
        text: 'Your session has timed out. Please login again to access your courses.',
        background: '#111827',
        color: '#fff',
        confirmButtonColor: '#3b82f6',
        confirmButtonText: 'Go to Login'
      });
      localStorage.clear();
      window.location.href = "login.html";
      return;
    }

    const data = await res.json();
    console.log("📦 Courses Found:", data.length || 0);

    const courses = Array.isArray(data) ? data : [];

    if (courses.length === 0) {
      renderEmptyState();
      return;
    }

    renderCourses(courses);

  } catch (err) {
    console.error("❌ Fetch Error:", err);
    courseDiv.innerHTML = `
      <div style="text-align:center; padding:40px; color:#f87171;">
        <h3>Connection Failed</h3>
        <p>Unable to load your courses. Please check your internet connection and try again.</p>
        <button onclick="fetchMyCourses()" style="background:#3b82f6; color:#fff; border:none; padding:10px 20px; border-radius:5px; margin-top:10px; cursor:pointer;">Retry</button>
      </div>
    `;
  }
}

function renderCourses(courses) {
  let html = `
    <div class="my-library-header" style="margin-bottom: 30px;">
      <h2 style="color:#fff;">📚 My Learning Library (${courses.length})</h2>
      <p style="color:#94a3b8;">You have access to ${courses.length} premium training programs.</p>
    </div>
    <div class="courses-grid">
  `;

  courses.forEach((course) => {
    const thumbUrl = course.thumbnail?.startsWith("http")
      ? course.thumbnail
      : `${baseUrl}/${course.thumbnail}`;

    // ✅ Backend se aaya hua direct status use karein
    const isLocked = course.isLocked === true;

    html += `
      <div class="course-card" style="${isLocked ? 'border: 1px solid #ef4444; opacity: 0.9;' : ''}">
        <div class="thumb-container">
          <img 
            src="${thumbUrl}" 
            alt="${course.title}" 
            style="${isLocked ? 'filter: blur(4px) grayscale(1);' : ''}"
            onerror="this.src='https://placeholder.com'"
          >
          <span class="category-tag" style="background:${isLocked ? '#ef4444' : '#3b82f6'}">
            ${isLocked ? "LOCKED 🔒" : (course.category || "Premium")}
          </span>
        </div>
        <div class="card-body">
          <h3 style="color:#fff; font-size:18px; margin-bottom:10px;">${course.title}</h3>
          
          ${isLocked ? `
                 <!-- 🚫 LOCKED STATE -->
            <div style="background: rgba(239, 68, 68, 0.1); border: 1px solid #ef4444; padding: 12px; border-radius: 10px; margin-bottom: 12px;">
                <p style="color:#ef4444; font-size:13px; font-weight:bold; margin:0; line-height:1.4;">
                   ⚠️ ACCESS RESTRICTED!<br>
                   <span style="font-size:11px; font-weight:normal; color:#f8fafc;">This course is hidden. Contact support to unlock.</span>
                </p>
            </div>
            
            <!-- 📱 SUPPORT OPTIONS (WhatsApp & Email) -->
           <div style="display: flex; gap: 8px;">
  
  <!-- ✅ WhatsApp Support -->
  <button class="watch-btn" 
    onclick="window.open('https://wa.me/916200986380?text=${encodeURIComponent(`Admin, My course ${course.title} is locked. ID: ${course._id}`)}', '_blank')" 
    style="background: #25d366; flex: 1; border: none; padding: 10px; border-radius: 8px; cursor: pointer; color: #fff; font-weight: bold; font-size: 11px;">
    <i class="fab fa-whatsapp"></i> WhatsApp
  </button>

  <!-- ✅ Email Support -->
  <button class="watch-btn" 
    onclick="window.location.href='mailto:support.br30@gmail.com?subject=${encodeURIComponent(`Course Locked: ${course.title}`)}&body=${encodeURIComponent(`User ID: ${course._id}`)}'" 
    style="background: #3b82f6; flex: 1; border: none; padding: 10px; border-radius: 8px; cursor: pointer; color: #fff; font-weight: bold; font-size: 11px;">
    <i class="fas fa-envelope"></i> Email
  </button>
            </div>
          ` : `
            <!-- ✅ NORMAL STATE -->
            <p style="color:#94a3b8; font-size:14px; line-height:1.5; margin-bottom: 15px;">
              ${course.description ? course.description.substring(0, 80) + "..." : "Master the markets with our elite trading strategies 🚀"}
            </p>
            <button class="watch-btn" onclick="watchCourse('${course._id}')" style="width:100%; border:none; cursor:pointer;">
              ▶ Start Learning
            </button>
          `}
        </div>
      </div>
    `;
  });

  html += `</div>`;
  courseDiv.innerHTML = html;
}


function renderEmptyState() {
  courseDiv.innerHTML = `
    <div style="text-align:center; padding:80px 20px; background:#0f172a; border-radius:24px; border:1px solid rgba(59, 130, 246, 0.2); margin-top:30px;">
      <div style="font-size:70px; margin-bottom:20px;">🎒</div>
      <h2 style="color:#fff;">Your Library is Empty</h2>
      <p style="color:#94a3b8; margin:20px 0;">You haven’t enrolled in any premium courses yet. Start your trading journey today!</p>
      <button 
        onclick="window.location.href='../index.html#Premium-Trading-Courses'"
        style="background:#3b82f6; color:#fff; border:none; padding:14px 40px; border-radius:50px; font-weight:bold; cursor:pointer; font-size:16px;"
      >
        🚀 Browse Elite Courses
      </button>
    </div>
  `;
}

function watchCourse(courseId) {
  if (!courseId) return;
  console.log("%c[REDIRECT] Opening course player...", "color: #3b82f6; font-weight: bold;");
  window.location.href = `watch.html?id=${courseId}`;
}

</script>
  <script src="../js/security.js"></script>
  </body>
</html>
