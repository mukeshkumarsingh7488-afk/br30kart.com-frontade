<!doctype html>
<html lang="hi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Title -->
    <title>Sales Records | BR30 Kart</title>

    <!-- Security: Private admin page -->
    <meta name="robots" content="noindex, nofollow" />

    <!-- Prevent caching (important for financial/admin data) -->
    <meta
      http-equiv="Cache-Control"
      content="no-store, no-cache, must-revalidate"
    />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />

    <!-- Favicon -->
    <link
      rel="icon"
      href="https://i.ibb.co/JRJ2Dv9W/BR30-LOGO.jpg"
      type="image/png"
    />
    <!-- ✅ Icons -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <!-- ✅ SweetAlert -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11" defer></script>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Icons -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link rel="stylesheet" href="../assets/css/sales-records.css" />

    <!-- Optional: Open Graph (UI only, not indexable page) -->
    <meta property="og:title" content="Sales Records | BR30 Kart" />
    <meta
      property="og:description"
      content="Admin sales analytics dashboard for BR30 Kart."
    />
    <meta
      property="og:image"
      content="https://i.ibb.co/JRJ2Dv9W/BR30-LOGO.jpg"
    />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="BR30 Kart" />
  </head>

  <body>
    <!-- Google Tag Manager (noscript) -->
    <noscript>
      <iframe
        src="https://www.googletagmanager.com/ns.html?id=GTM-TT7SLZ4L"
        height="0"
        width="0"
        style="display: none; visibility: hidden"
      ></iframe>
    </noscript>
    <!-- End Google Tag Manager (noscript) -->

    <!-- Main Header -->
    <div class="p-6">
      <div class="flex justify-between items-center mb-8">
        <div class="flex items-center gap-4">
          <a
            href="seller-analytics.html"
            class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg text-xs font-bold transition"
          >
            BACK TO Dashbord
          </a>
          <h1 class="text-2xl font-black italic">
            SALES
            <span class="text-blue-500">RECORDS</span>
          </h1>
        </div>

        <!-- 🚀 2. CENTER LOGO: बिल्कुल बीच में लगाने के लिए -->
        <div
          class="absolute left-1/2 -translate-x-1/2 flex flex-col items-center justify-center"
        >
          <!-- लोगो ऊपर -->
          <img
            src="../images/BR30™  LOGO.jpeg"
            alt="Logo"
            class="h-10 w-auto object-contain mb-1"
          />

          <!-- नाम नीचे -->
          <span
            class="text-sm font-black tracking-widest text-white uppercase leading-none"
          >
            BR30
            <span class="text-blue-500">KART</span>
          </span>
        </div>

        <div class="relative flex gap-2">
          <div class="relative">
            <i class="fas fa-search absolute left-3 top-3 text-gray-500"></i>
            <input
              type="text"
              id="courseSearch"
              oninput="applyFilters()"
              placeholder="Search Course Name..."
              class="bg-[#111827] border border-gray-700 text-white pl-10 pr-4 py-2 rounded-xl text-sm w-72 outline-none focus:border-blue-500"
            />
          </div>
          <button
            onclick="resetFilters()"
            class="bg-gray-700 hover:bg-gray-600 text-white px-3 py-2 rounded-lg transition"
            title="Reset Search"
          >
            <i class="fas fa-sync-alt"></i>
          </button>
        </div>
      </div>

      <!-- 4 Stats Boxes: एक लाइन में (Grid 4) -->
      <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
        <div class="stat-card p-4 border-l-4 border-l-blue-500">
          <p class="text-gray-500 text-[9px] font-bold uppercase">
            Total Sales Revenue
          </p>
          <h2 class="text-2xl font-black" id="totalRevenue">₹0</h2>
        </div>
        <div class="stat-card p-4 border-l-4 border-l-green-500">
          <p class="text-gray-500 text-[9px] font-bold uppercase">
            Your Earnings (80%)
          </p>
          <h2 class="text-2xl font-black text-green-500" id="sellerPayout">
            ₹0
          </h2>
        </div>
        <div class="stat-card p-4 border-l-4 border-l-yellow-500">
          <p class="text-gray-500 text-[9px] font-bold uppercase">
            Pending Payout
          </p>
          <h2 class="text-2xl font-black text-yellow-500" id="pendingAmount">
            ₹0
          </h2>
        </div>
        <div class="stat-card p-4 border-l-4 border-l-red-500">
          <p class="text-gray-500 text-[9px] font-bold uppercase">
            Platform Fee (20%)
          </p>
          <h2 class="text-2xl font-black text-red-500" id="platformFee">₹0</h2>
        </div>
      </div>

      <!-- Filter Bar -->
      <div
        class="bg-[#0f1216] p-4 rounded-xl mb-6 flex items-center justify-center gap-4 border border-[#1f2937]"
      >
        <!-- justify-center से सब सेंटर में आएगा -->

        <!-- Start Date -->
        <div class="relative flex items-center">
          <input type="date" id="startDate" class="date-input" />
        </div>

        <span class="text-gray-600 font-bold">to</span>

        <!-- End Date -->
        <div class="relative flex items-center">
          <input type="date" id="endDate" class="date-input" />
        </div>

        <!-- Apply Filter Button -->
        <button
          onclick="applyFilters()"
          class="bg-green-600 hover:bg-green-700 text-white px-6 py-2 rounded-lg font-bold text-xs uppercase transition"
        >
          Apply
        </button>

        <!-- Refresh Button -->
        <button
          onclick="resetFilters()"
          class="bg-gray-700 hover:bg-gray-600 text-white px-3 py-2 rounded-lg transition"
        >
          <i class="fas fa-sync-alt"></i>
        </button>

        <!-- PDF Button (अब इसी लाइन में सेंटर में है) -->
        <button
          onclick="exportToPDF()"
          class="bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded-lg font-bold text-xs flex items-center gap-2 transition"
        >
          <i class="fas fa-file-pdf"></i>
          PDF
        </button>
        <!-- PDF Button (अब इसी लाइन में सेंटर में है) -->
        <button
          onclick="exportCSV()"
          class="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded-lg font-bold text-xs flex items-center gap-2 transition"
        >
          <i class="fas fa-file-pdf"></i>
          CSV
        </button>
      </div>

      <!-- Scrollable Table -->
      <div class="table-container">
        <table class="w-full text-left">
          <thead
            class="sticky top-0 bg-[#161b22] text-gray-400 text-[10px] font-bold uppercase"
          >
            <tr>
              <th class="px-6 py-4">Sale Date</th>
              <th class="px-6 py-4">Course Title</th>
              <th class="px-6 py-4 text-blue-400">STUDENT NAME</th>
              <th class="px-6 py-4">Payment Status</th>
              <th class="px-6 py-4 text-right">Amount</th>
              <th class="px-6 py-4 text-center">Payout</th>
            </tr>
          </thead>
          <tbody id="salesTableBody" class="divide-y divide-[#1f2937]"></tbody>
        </table>
      </div>
    </div>

    <script src="../js/config.js"></script>
    <script src="../js/sels-record.js"></script>
    <script src="../js/security.js"></script>
  </body>
</html>
