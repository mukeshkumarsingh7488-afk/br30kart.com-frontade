    <meta property="og:image" content="https://i.ibb.co/KxnQc4gx/BR30-LOGO1.png" />

  <body>
    <!-- Google Tag Manager (noscript) -->
    <noscript>
      <iframe src="https://www.googletagmanager.com/ns.html?id=GTM-5CDWCQ5S" height="0" width="0" style="display: none; visibility: hidden"></iframe>
    </noscript>
    <!-- End Google Tag Manager (noscript) -->
    <div class="admin-header">
      <div class="logo">
        BR30
        <span>ADMIN</span>
      </div>
      <div class="search-box">
        <i class="fas fa-search"></i>
        <input type="text" id="searchInput" placeholder="Search seller by email..." onkeyup="searchSeller()" />
      </div>
      <button onclick="clearSearch()" style="background: #2d333b; border: 1px solid #3d444d; color: white; width: 38px; height: 38px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center">
        <i class="fas fa-sync-alt"></i>
      </button>
      <a href="/admin-dashboard" class="btn-back">
        <i class="fas fa-arrow-left"></i>
        Back to Dashboard
      </a>
    </div>
    <div class="table-section">
      <div class="table-header">
        <h2>Seller Document History & KYC 📑</h2>
      </div>
      <div class="scroll-container">
        <table>
          <thead>
            <tr>
              <th>Seller Name</th>
              <th>Email Address</th>
              <th>Status</th>
              <th>Aadhar No</th>
              <th>Aadhar Front</th>
              <th>Aadhar Back</th>
              <th>Bank Name</th>
              <th>Account No</th>
              <th>IFSC</th>
              <th>Cheque/Passbook</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="sellerTableBody"></tbody>
        </table>
      </div>
      <div id="noData" class="status-msg" style="display: none">
        <i class="fas fa-search fa-2x"></i>
        <br />
        Koi match milne wala data nahi hai.
      </div>
    </div>
    <div id="rejectModal">
      <div class="modal-box">
        <h3>Reject Seller ❌</h3>
        <div id="reasonOptions">
          <label>
            <input type="checkbox" value="Aadhar Card clear nahi hai." />
            Aadhar Card clear nahi hai
          </label>
          <label>
            <input type="checkbox" value="Bank Details galat hain." />
            Bank Details galat hain
          </label>
          <label>
            <input type="checkbox" value="Documents missing hain." />
            Documents missing hain
          </label>
          <label>
            <input type="checkbox" value="Details match nahi ho rahi." />
            Details match nahi ho rahi
          </label>
        </div>
        <div class="btns">
          <button onclick="closeRejectModal()" id="cancel">Cancel</button>
          <button id="confirmRejectBtn">Confirm Reject</button>
        </div>
      </div>
    </div>
    <script src="/js/config.js"></script>
    <script src="../js/seller-docs-logic.js"></script>
  </body>
