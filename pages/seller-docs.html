<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Title -->
    <title>Seller KYC Documents | BR30 Kart</title>

    <!-- Private admin security -->
    <meta name="robots" content="noindex, nofollow" />

    <!-- No cache (VERY IMPORTANT for KYC data) -->
    <meta
      http-equiv="Cache-Control"
      content="no-store, no-cache, must-revalidate"
    />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />

    <!-- Favicon -->
    <link
      rel="icon"
      href="https://i.ibb.co/JRJ2Dv9W/BR30-LOGO.jpg"
      type="image/png"
    />

    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <!-- ✅ SweetAlert -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11" defer></script>

    <!-- Optional Open Graph (UI only, not indexable) -->
    <meta property="og:title" content="Seller KYC Documents | BR30 Kart" />
    <meta
      property="og:description"
      content="Secure seller identity verification documents panel for BR30 Kart admin."
    />
    <meta
      property="og:image"
      content="https://i.ibb.co/JRJ2Dv9W/BR30-LOGO.jpg"
    />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="BR30 Kart" />

    <style>
      @import url("https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap");

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Poppins", sans-serif;
      }

      body {
        background-color: #0d0d0d;
        color: #fff;
        padding: 20px;
      }
      /* Header & Search Area */
      .admin-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 30px;
        border-bottom: 1px solid #1c1c1c;
        padding-bottom: 15px;
      }
      .logo {
        color: #00ff88; /* 🔥 Green Logo */
        font-weight: 900;
        font-size: 1.6rem;
        letter-spacing: 2px;
        text-shadow: 0 0 10px rgba(0, 255, 136, 0.3);
      }
      .logo span {
        color: #fff;
      }

      .search-box {
        position: relative;
        width: 500px;
      }

      .search-box input {
        width: 100%;
        padding: 12px 45px;
        background: #111;
        border: 1px solid #333;
        border-radius: 12px;
        color: #fff;
        outline: none;
        transition: 0.3s all ease;
      }
      /* 🔥 Pink to Neon Green Focus Fix */
      .search-box input:focus {
        border-color: #00ff88;
        background: #161b22;
        box-shadow: 0 0 15px rgba(0, 255, 136, 0.2);
      }

      .search-box i {
        position: absolute;
        left: 15px;
        top: 14px;
        color: #00ff88;
        font-size: 1.1rem;
      }

      /* Table Header H2 Fix (Pink to Green) */
      .table-header h2 {
        font-size: 1.4rem;
        color: #00ff88 !important;
        font-weight: 600;
        letter-spacing: 1px;
      }
      /* Table Styling */
      .table-section {
        background: #161b22;
        border-radius: 15px;
        border: 1px solid #30363d;
        overflow: hidden;
        margin-top: 20px;
      }
      .table-header {
        padding: 20px;
        border-bottom: 1px solid #30363d;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .table-header h2 {
        font-size: 1.2rem;
        color: #00ff88;
      }

      .scroll-container {
        overflow-x: auto;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        min-width: 1600px;
      }
      th {
        background: #0d1117;
        color: #8b949e;
        text-align: left;
        padding: 15px;
        font-size: 12px;
        text-transform: uppercase;
        border-bottom: 1px solid #30363d;
      }
      td {
        padding: 15px;
        border-bottom: 1px solid #30363d;
        font-size: 13px;
      }
      tr:hover {
        background: #1c2128;
      }

      /* Document Images */
      .doc-preview {
        width: 50px;
        height: 35px;
        border-radius: 5px;
        border: 1px solid #30363d;
        object-fit: cover;
        cursor: pointer;
        transition: 0.3s;
      }
      .doc-preview:hover {
        transform: scale(2.5);
        border-color: #00ff88;
        z-index: 10;
        position: relative;
      }

      /* Action Buttons */
      .action-btns {
        display: flex;
        gap: 8px;
      }
      button {
        border: none;
        padding: 8px 12px;
        border-radius: 6px;
        cursor: pointer;
        font-weight: 600;
        font-size: 12px;
        color: #fff;
        transition: 0.2s;
      }
      button:active {
        transform: scale(0.95);
      }

      /* Status Badges */
      .badge {
        padding: 4px 8px;
        border-radius: 20px;
        font-size: 10px;
        font-weight: bold;
        text-transform: uppercase;
      }
      .status-verified {
        background: rgba(35, 134, 54, 0.2);
        color: #3fb950;
        border: 1px solid #238636;
      }
      .status-pending {
        background: rgba(210, 153, 34, 0.2);
        color: #d29922;
        border: 1px solid #d29922;
      }

      /* 🔙 Back to Dashboard Button - Elite Green Version */
      .btn-back {
        color: #00ff88;
        text-decoration: none;
        font-size: 14px;
        font-weight: 600;
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 10px 18px;
        border: 1px solid rgba(0, 255, 136, 0.3);
        border-radius: 10px;
        background: rgba(0, 255, 136, 0.05);
        transition: all 0.3s ease-in-out;
      }

      /* 🔥 Hover Effect Logic */
      .btn-back:hover {
        background: #00ff88;
        color: #000 !important;
        box-shadow: 0 0 20px rgba(0, 255, 136, 0.4);
        transform: translateX(-5px);
        border-color: #00ff88;
      }

      .btn-back i {
        font-size: 12px;
        transition: transform 0.3s ease;
      }

      .btn-back:hover i {
        transform: scale(1.2);
      }

      .status-msg {
        text-align: center;
        padding: 50px;
        color: #8b949e;
      }
      /* reject btn css */
      /* Modal background */
      #rejectModal {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.8);
        z-index: 9999;
        align-items: center;
        justify-content: center;
      }

      /* Modal box */
      .modal-box {
        background: #222;
        padding: 25px;
        border-radius: 12px;
        width: 400px;
        color: white;
        border: 1px solid #444;
      }

      /* Checkbox FIX */
      #reasonOptions input[type="checkbox"] {
        display: inline-block !important;
        appearance: auto !important;
        width: 16px;
        height: 16px;
        cursor: pointer;
      }

      /* Label style */
      #reasonOptions label {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 10px;
        cursor: pointer;
      }

      /* Buttons */
      .btns {
        display: flex;
        justify-content: flex-end;
        gap: 10px;
      }

      .btns button {
        padding: 8px 15px;
        cursor: pointer;
      }

      #confirmRejectBtn {
        background: #ff4d4d;
        color: white;
        border: none;
        border-radius: 5px;
      }

      #cancel {
        background: #00d2ff !important;
        color: white !important;
      }
    </style>
  </head>
  <body>
    <!-- Google Tag Manager (noscript) -->
    <noscript>
      <iframe
        src="https://www.googletagmanager.com/ns.html?id=GTM-TT7SLZ4L"
        height="0"
        width="0"
        style="display: none; visibility: hidden"
      ></iframe>
    </noscript>
    <!-- End Google Tag Manager (noscript) -->
    <div class="admin-header">
      <div class="logo">
        BR30
        <span>ADMIN</span>
      </div>
      <div class="search-box">
        <i class="fas fa-search"></i>
        <input
          type="text"
          id="searchInput"
          placeholder="Search seller by email..."
          onkeyup="searchSeller()"
        />
      </div>
      <button
        onclick="clearSearch()"
        style="
          background: #2d333b;
          border: 1px solid #3d444d;
          color: white;
          width: 38px;
          height: 38px;
          border-radius: 8px;
          cursor: pointer;
          display: flex;
          align-items: center;
          justify-content: center;
        "
      >
        <i class="fas fa-sync-alt"></i>
      </button>
      <a href="admin-dashboard.html" class="btn-back">
        <i class="fas fa-arrow-left"></i>
        Back to Dashboard
      </a>
    </div>

    <div class="table-section">
      <div class="table-header">
        <h2>Seller Document History & KYC 📑</h2>
      </div>
      <div class="scroll-container">
        <table>
          <thead>
            <tr>
              <th>Seller Name</th>
              <th>Email Address</th>
              <th>Status</th>
              <th>Aadhar No</th>
              <th>Aadhar Front</th>
              <th>Aadhar Back</th>
              <th>Bank Name</th>
              <th>Account No</th>
              <th>IFSC</th>
              <th>Cheque/Passbook</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="sellerTableBody">
            <!-- JS Logic se yahan data load hoga -->
          </tbody>
        </table>
      </div>
      <div id="noData" class="status-msg" style="display: none">
        <i class="fas fa-search fa-2x"></i>
        <br />
        Koi match milne wala data nahi hai.
      </div>
    </div>

    <!-- Reject Modal -->
    <div id="rejectModal">
      <div class="modal-box">
        <h3>Reject Seller ❌</h3>

        <div id="reasonOptions">
          <label>
            <input type="checkbox" value="Aadhar Card clear nahi hai." />
            Aadhar Card clear nahi hai
          </label>
          <label>
            <input type="checkbox" value="Bank Details galat hain." />
            Bank Details galat hain
          </label>
          <label>
            <input type="checkbox" value="Documents missing hain." />
            Documents missing hain
          </label>
          <label>
            <input type="checkbox" value="Details match nahi ho rahi." />
            Details match nahi ho rahi
          </label>
        </div>

        <div class="btns">
          <button onclick="closeRejectModal()" id="cancel">Cancel</button>
          <button id="confirmRejectBtn">Confirm Reject</button>
        </div>
      </div>
    </div>

    <!-- JS Files Connect -->
    <script src="../js/config.js"></script>
    <script src="../js/seller-docs-logic.js"></script>
    <script src="/js/security.js"></script>
  </body>
</html>
