<!doctype html>
<html lang="en">
  <head>
    <!-- Google Tag Manager -->
    <script>

          j = d.createElement(s),
          dl = l != "dataLayer" ? "&l=" + l : "";
        j.async = true;
        j.src = "https://www.googletagmanager.com/gtm.js?id=" + i + dl;
        f.parentNode.insertBefore(j, f);
      })(window, document, "script", "dataLayer", "GTM-TT7SLZ4L");
    </script>

    <!-- Basic -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Title -->
    <title>My Profile | BR30 Kart</title>

    <!-- Security: Private page -->
    <meta name="robots" content="noindex, nofollow" />

    <!-- Cache control (important for user data pages) -->
    <meta
      http-equiv="Cache-Control"
      content="no-store, no-cache, must-revalidate"
    />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />

    <!-- Favicon -->
    <link
      rel="icon"
      href="https://i.ibb.co/JRJ2Dv9W/BR30-LOGO.jpg"
      type="image/png"
    />

    <!-- Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap"
      rel="stylesheet"
    />

    <!-- Icons -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <!-- sweet alart-->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <!-- ✅ SweetAlert -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11" defer></script>
    <!-- Optional: Open Graph (only for UI consistency, not SEO index) -->
    <meta property="og:title" content="My Profile | BR30 Kart" />
    <meta
      property="og:description"
      content="User profile dashboard on BR30 Kart platform."
    />
    <meta
      property="og:image"
      content="https://i.ibb.co/JRJ2Dv9W/BR30-LOGO.jpg"
    />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="BR30 Kart" />

    <style>
      /* =========================================
           1. GLOBAL & BODY STYLES (Dark Theme)
        ========================================= */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Poppins", sans-serif;
      }

      body {
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background-color: #050505;
        /* Aapka Body Color */
        padding: 20px;
      }

      /* =========================================
           2. PROFILE CARD (Responsive)
        ========================================= */
      .profile-card {
        width: 100%;
        max-width: 360px;
        padding: 30px;
        background: #1e293b;
        /* Card Color */
        border: 1px solid #334155;
        border-radius: 20px;
        text-align: center;
        box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
        color: white;
      }

      /* Profile Pic Section */
      .photo-container {
        position: relative;
        display: inline-block;
        margin-bottom: 20px;
      }

      .profile-pic {
        width: 110px;
        height: 110px;
        border-radius: 50%;
        border: 3px solid #a020f0;
        /* Purple Border */
        object-fit: cover;
        background: #050505;
      }

      .upload-label {
        position: absolute;
        bottom: 5px;
        right: 5px;
        background: #a020f0;
        color: white;
        width: 32px;
        height: 32px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        border: 2px solid #1e293b;
        font-size: 14px;
      }

      /* Text & Inputs */
      h2 {
        font-size: 22px;
        font-weight: 600;
        margin-bottom: 5px;
      }

      p#userEmail {
        font-size: 14px;
        color: #94a3b8;
        margin-bottom: 25px;
      }

      .edit-box input {
        width: 100%;
        padding: 12px;
        background: #050505;
        border: 1px solid #334155;
        border-radius: 10px;
        margin-bottom: 15px;
        outline: none;
        color: white;
        text-align: center;
      }

      .edit-box input:focus {
        border-color: #a020f0;
      }

      /* =========================================
           3. BUTTONS & LINKS
        ========================================= */
      .buttons {
        display: flex;
        flex-direction: column;
        gap: 12px;
        margin-top: 10px;
      }

      button {
        width: 100%;
        padding: 12px;
        border: none;
        border-radius: 10px;
        font-weight: 600;
        cursor: pointer;
        transition: 0.3s ease;
        font-size: 15px;
      }

      /* Primary Purple Buttons */
      #editBtn,
      #saveBtn {
        background: #a020f0;
        color: white;
      }

      /* Logout Button (Outline style) */
      #logoutBtn {
        background: transparent;
        border: 1px solid #f87171;
        color: #f87171;
      }

      button:hover {
        transform: translateY(-2px);
        opacity: 0.9;
      }

      #logoutBtn:hover {
        background: #f87171;
        color: white;
      }

      .back-home {
        text-decoration: none;
        color: #a020f0;
        font-size: 14px;
        font-weight: 500;
        margin-top: 15px;
        display: inline-block;
      }

      /* Mobile Fixes */
      @media (max-width: 480px) {
        .profile-card {
          padding: 25px 20px;
        }
      }
    </style>
  </head>

  <body>
    <!-- ✅ GTM noscript -->
    <noscript>
      <iframe
        src="https://www.googletagmanager.com/ns.html?id=GTM-TT7SLZ4L"
        height="0"
        width="0"
        style="display: none; visibility: hidden"
      ></iframe>
    </noscript>
    <div class="profile-card">
      <!-- User Avatar Section -->
      <div class="photo-container">
        <img
          id="profilePic"
          src=""
          class="profile-pic"
          alt="Profile"
          onclick="document.getElementById('fileInput').click()"
          style="cursor: pointer"
        />
        <label for="fileInput" class="upload-label">📷</label>
        <input
          type="file"
          id="fileInput"
          style="display: none"
          accept="image/*"
        />
      </div>

      <h2 id="userName">Loading...</h2>
      <p id="userEmail">Loading...</p>

      <div class="edit-box">
        <input
          type="text"
          id="editName"
          placeholder="Enter New Name"
          style="display: none"
        />
      </div>

      <div class="buttons">
        <button id="editBtn">Edit Profile</button>
        <button id="saveBtn" style="display: none">Save Changes</button>
        <button id="logoutBtn" onclick="logout()">Logout</button>
        <a href="../index.html" class="back-home">Back to Home</a>
      </div>
    </div>

    <script src="../js/config.js"></script>
    <script>
      const API_URL = window.API_BASE_URL + "/api/auth";

      // 1. AUTH GUARD & DATA LOAD
      window.onload = async function () {
        const token = localStorage.getItem("token");
        console.log("🛑 Checking Token Status:", token ? "Active" : "Missing");

        if (!token) {
          await Swal.fire({
            icon: "error",
            title: "Authentication Required",
            text: "Please login to access your profile.",
            background: "#111827",
            color: "#fff",
          });
          window.location.href = "login.html";
          return;
        }

        try {
          const res = await fetch(`${window.API_BASE_URL}/api/auth/profile`, {
            headers: {
              Authorization: `Bearer ${token}`,
            },
          });

          if (!res.ok) throw new Error("Session Expired");

          const user = await res.json();

          // UI Update logic
          const name = user.name || (user.user && user.user.name) || "User";
          const email =
            user.email || (user.user && user.user.email) || "No Email Found";
          const profilePic =
            user.profilePic || (user.user && user.user.profilePic);

          document.getElementById("userName").innerText = name;
          document.getElementById("userEmail").innerText = email;
          document.getElementById("editName").value = name;

          // ✅ CLOUDINARY IMAGE LOGIC
          const picElement = document.getElementById("profilePic");
          const defaultAvatar = `https://ui-avatars.com/api/?name=${encodeURIComponent(name)}&background=a020f0&color=fff&size=128&bold=true`;

          if (
            profilePic &&
            typeof profilePic === "string" &&
            profilePic.startsWith("http")
          ) {
            picElement.src = profilePic;
            picElement.onerror = () => {
              picElement.src = defaultAvatar;
            };
          } else {
            picElement.src = defaultAvatar;
          }
        } catch (err) {
          console.error("Profile Load Error:", err);
          localStorage.clear();
          window.location.href = "login.html";
        }
      };

      // 2. PHOTO UPLOAD LOGIC
      document
        .getElementById("fileInput")
        .addEventListener("change", async function () {
          const file = this.files[0];
          if (!file) return;

          // Show Loading Alert
          Swal.fire({
            title: "Uploading Photo...",
            text: "Updating your profile picture on Cloudinary",
            allowOutsideClick: false,
            background: "#111827",
            color: "#fff",
            didOpen: () => {
              Swal.showLoading();
            },
          });

          const formData = new FormData();
          formData.append("profilePic", file);

          const token = localStorage.getItem("token");

          try {
            const res = await fetch(
              window.API_BASE_URL + "/api/auth/update-profile",
              {
                method: "PUT",
                headers: { "x-auth-token": token },
                body: formData,
              },
            );

            const data = await res.json();

            if (res.ok) {
              const updatedUser = data.user || data;
              const newPicUrl = updatedUser.profilePic;

              // UI & Storage Update
              document.getElementById("profilePic").src = newPicUrl;
              let userData = JSON.parse(localStorage.getItem("userData")) || {};
              userData.profilePic = newPicUrl;
              localStorage.setItem("userData", JSON.stringify(userData));

              Swal.fire({
                icon: "success",
                title: "Photo Updated!",
                text: "Your profile picture has been changed successfully.",
                background: "#111827",
                color: "#fff",
                timer: 2000,
                showConfirmButton: false,
              });
            } else {
              throw new Error(data.msg || "Upload failed");
            }
          } catch (err) {
            Swal.fire({
              icon: "error",
              title: "Upload Failed",
              text: err.message,
              background: "#111827",
              color: "#fff",
            });
          }
        });

      // 3. EDIT UI TOGGLE
      document.getElementById("editBtn").addEventListener("click", () => {
        document.getElementById("userName").style.display = "none";
        document.getElementById("editName").style.display = "block";
        document.getElementById("editBtn").style.display = "none";
        document.getElementById("saveBtn").style.display = "inline-block";
        document.getElementById("editName").focus();
      });

      document.getElementById("editName").addEventListener("keypress", (e) => {
        if (e.key === "Enter") {
          e.preventDefault();
          document.getElementById("saveBtn").click();
        }
      });

      // 4. NAME SAVE LOGIC
      document.getElementById("saveBtn").addEventListener("click", async () => {
        const newName = document.getElementById("editName").value.trim();
        const token = localStorage.getItem("token");

        if (!newName) {
          return Swal.fire("Warning", "Name cannot be empty!", "warning");
        }

        try {
          Swal.fire({
            title: "Saving...",
            background: "#111827",
            color: "#fff",
            didOpen: () => {
              Swal.showLoading();
            },
          });

          const res = await fetch(
            window.API_BASE_URL + "/api/auth/update-profile",
            {
              method: "PUT",
              headers: {
                "Content-Type": "application/json",
                "x-auth-token": token,
              },
              body: JSON.stringify({ name: newName }),
            },
          );

          const data = await res.json();

          if (res.ok) {
            const finalName =
              data.name || (data.user && data.user.name) || newName;
            document.getElementById("userName").innerText = finalName;

            // Reset UI
            document.getElementById("userName").style.display = "block";
            document.getElementById("editName").style.display = "none";
            document.getElementById("editBtn").style.display = "inline-block";
            document.getElementById("saveBtn").style.display = "none";

            // LocalStorage Sync
            let userData = JSON.parse(localStorage.getItem("userData")) || {};
            userData.name = finalName;
            localStorage.setItem("userData", JSON.stringify(userData));

            Swal.fire({
              icon: "success",
              title: "Name Updated!",
              timer: 1500,
              showConfirmButton: false,
              background: "#111827",
              color: "#fff",
            });
          } else {
            throw new Error(data.msg || "Update failed");
          }
        } catch (err) {
          Swal.fire("Error", err.message, "error");
        }
      });

      // 5. LOGOUT LOGIC
      async function logout() {
        const result = await Swal.fire({
          title: "Log Out?",
          text: "Are you sure you want to end your session?",
          icon: "question",
          showCancelButton: true,
          confirmButtonColor: "#d33",
          confirmButtonText: "Yes, Logout",
          background: "#111827",
          color: "#fff",
        });

        if (result.isConfirmed) {
          localStorage.clear();
          window.location.href = "login.html";
        }
      }
    </script>

    <script src="/js/security.js"></script>
  </body>
</html>
