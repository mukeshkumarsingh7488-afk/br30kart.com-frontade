<!doctype html>
<html lang="en">
  <head>

          j = d.createElement(s),
          dl = l != "dataLayer" ? "&l=" + l : "";
        j.async = true;
        j.src = "https://www.googletagmanager.com/gtm.js?id=" + i + dl;
        f.parentNode.insertBefore(j, f);
      })(window, document, "script", "dataLayer", "GTM-TT7SLZ4L");
    </script>

    <!-- Basic -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Title -->
    <title>My Profile | BR30 Kart</title>

    <!-- Security: Private page -->
    <meta name="robots" content="noindex, nofollow" />

    <!-- Cache control (important for user data pages) -->
    <meta
      http-equiv="Cache-Control"
      content="no-store, no-cache, must-revalidate"
    />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />

    <!-- Favicon -->
    <link
      rel="icon"
      href="https://i.ibb.co/JRJ2Dv9W/BR30-LOGO.jpg"
      type="image/png"
    />

    <!-- Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap"
      rel="stylesheet"
    />

    <!-- Icons -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="stylesheet" href="../assets/css/style.css" />
    <link rel="stylesheet" href="../assets/css/profile.css" />

    <!-- sweet alart-->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <!-- ✅ SweetAlert -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11" defer></script>
    <!-- Optional: Open Graph (only for UI consistency, not SEO index) -->
    <meta property="og:title" content="My Profile | BR30 Kart" />
    <meta
      property="og:description"
      content="User profile dashboard on BR30 Kart platform."
    />
    <meta
      property="og:image"
      content="https://i.ibb.co/JRJ2Dv9W/BR30-LOGO.jpg"
    />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="BR30 Kart" />
  </head>

  <body>
    <!-- ✅ GTM noscript -->
    <noscript>
      <iframe
        src="https://www.googletagmanager.com/ns.html?id=GTM-TT7SLZ4L"
        height="0"
        width="0"
        style="display: none; visibility: hidden"
      ></iframe>
    </noscript>
    <div class="profile-card">
      <!-- User Avatar Section -->
      <div class="photo-container">
        <img
          id="profilePic"
          src=""
          class="profile-pic"
          alt="Profile"
          onclick="document.getElementById('fileInput').click()"
          style="cursor: pointer"
        />
        <label for="fileInput" class="upload-label">📷</label>
        <input
          type="file"
          id="fileInput"
          style="display: none"
          accept="image/*"
        />
      </div>

      <h2 id="userName">Loading...</h2>
      <p id="userEmail">Loading...</p>

      <div class="edit-box">
        <input
          type="text"
          id="editName"
          placeholder="Enter New Name"
          style="display: none"
        />
      </div>

      <div class="buttons">
        <button id="editBtn">Edit Profile</button>
        <button id="saveBtn" style="display: none">Save Changes</button>
        <button id="logoutBtn" onclick="logout()">Logout</button>
        <a href="../index.html" class="back-home">Back to Home</a>
      </div>
    </div>

    <script src="../js/config.js"></script>
    <script src="../js/profile-logic.js"></script>
    <script src="../js/security.js"></script>
  </body>
</html>
