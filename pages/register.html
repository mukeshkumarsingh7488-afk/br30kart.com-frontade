<!doctype html>
<html lang="en">
  <head>

    <script>
      (function (w, d, s, l, i) {

        w[l].push({ "gtm.start": new Date().getTime(), event: "gtm.js" });
        var f = d.getElementsByTagName(s)[0],
          j = d.createElement(s),
          dl = l != "dataLayer" ? "&l=" + l : "";
        j.async = true;
        j.src = "https://www.googletagmanager.com/gtm.js?id=" + i + dl;
        f.parentNode.insertBefore(j, f);
      })(window, document, "script", "dataLayer", "GTM-TT7SLZ4L");
    </script>

    <!-- Basic -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Title -->
    <title>Register | BR30 Kart</title>

    <!-- SEO (private page) -->
    <meta
      name="description"
      content="Create your BR30 Kart account and get access to trading courses and learning resources."
    />

    <meta name="robots" content="noindex, nofollow" />

    <!-- Security: no cache -->
    <meta
      http-equiv="Cache-Control"
      content="no-store, no-cache, must-revalidate"
    />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />

    <!-- Favicon -->
    <link
      rel="icon"
      href="https://i.ibb.co/KxnQc4gx/BR30-LOGO1.png"
      type="image/png"
    />

    <!-- Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&family=Poppins:wght@400;700&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="../assets/css/register.css" />

    <!-- Icons -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />

    <!-- SweetAlert -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11" defer></script>
    <!-- sweet alart-->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <!-- ✅ SweetAlert -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11" defer></script>

    <!-- Config -->
    <script src="../assets/js/config.js"></script>

    <!-- Open Graph (optional UI only, not SEO indexing) -->
    <meta property="og:title" content="Register | BR30 Kart" />
    <meta
      property="og:description"
      content="Create your BR30 Kart account securely."
    />
    <meta
      property="og:image"
      content="https://i.ibb.co/KxnQc4gx/BR30-LOGO1.png"
    />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="BR30 Kart" />
  </head>

  <body>
    <!-- ✅ GTM noscript -->
    <noscript>
      <iframe
        src="https://www.googletagmanager.com/ns.html?id=GTM-TT7SLZ4L"
        height="0"
        width="0"
        style="display: none; visibility: hidden"
      ></iframe>
    </noscript>
    <div class="container">
      <div class="auth-header-row">
        <button
          type="button"
          id="buyerTab"
          class="role-btn-small active"
          onclick="setRole('student')"
        >
          Student
        </button>
        <h2 class="register-heading">Register</h2>
        <button
          type="button"
          id="sellerTab"
          class="role-btn-small"
          onclick="redirectToSeller()"
        >
          Seller
        </button>
      </div>

      <!-- SECTION 1: REGISTRATION (Wrapped in FORM for Password Saving) -->
      <form id="register-section" onsubmit="handleRegister(event)">
        <label>Full Name</label>
        <div class="input-box">
          <input
            id="username"
            name="username"
            placeholder="Only letters allowed"
            required
            oninput="this.value = this.value.replace(/[^a-zA-Z\s]/g, '')"
          />
        </div>

        <label>Email Address</label>
        <div class="input-box">
          <input
            id="email"
            name="email"
            type="email"
            placeholder="example@mail.com"
            autocomplete="email"
            required
          />
        </div>

        <label>Password</label>
        <div class="input-box">
          <!-- autocomplete="new-password" se Google prompt trigger hota hai -->
          <input
            id="password"
            name="password"
            type="password"
            placeholder="8+ chars, 1 Special (@#$%^&*)"
            autocomplete="new-password"
            required
          />
          <span
            class="toggle-btn"
            id="toggleBtn"
            onclick="togglePassword()"
            style="cursor: pointer"
          >
            👁️
          </span>
        </div>

        <button type="submit" id="regBtn">Send OTP</button>
      </form>

      <!-- SECTION 2: OTP VERIFICATION (Wrapped in FORM) -->
      <form
        id="otp-section"
        style="display: none"
        onsubmit="handleVerify(event)"
      >
        <p
          style="
            text-align: center;
            font-size: 13px;
            color: #94a3b8;
            margin-bottom: 15px;
          "
        >
          Verification code sent to email.
        </p>
        <label>Enter 6-Digit OTP</label>
        <div class="input-box">
          <input
            id="otpInput"
            type="number"
            placeholder="Ex: 123456"
            required
          />
        </div>
        <button type="submit" id="verifyBtn">Verify & Register</button>

        <!-- Timer & Resend -->
        <div style="text-align: center; margin-top: 15px">
          <p id="timerText" style="font-size: 12px; color: #94a3b8">
            Resend in
            <span id="timer">30</span>
            s
          </p>
          <button
            type="button"
            id="resendBtn"
            onclick="resendOTP()"
            style="
              display: none;
              background: none;
              color: #3b82f6;
              border: none;
              cursor: pointer;
              text-decoration: underline;
              font-size: 13px;
            "
          >
            Resend OTP
          </button>
        </div>
      </form>

      <div class="links">
        <a
          href="login.html"
          onclick="
            window.location.href = 'login.html';
            return false;
          "
          style="cursor: pointer; display: inline-block; padding: 10px"
        >
          Already have an account? Login
        </a>
      </div>
    </div>

    <script src="../js/config.js"></script>
    <script src="../js/register-logic.js"></script>
    <script src="../js/security.js"></script>
  </body>
</html>
