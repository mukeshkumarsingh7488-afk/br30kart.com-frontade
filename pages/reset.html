<!doctype html>
<html lang="en">
  <head>

        f.parentNode.insertBefore(j, f);

    <!-- Basic -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Title -->
    <title>Reset Password | BR30 Kart</title>

    <!-- Security -->
    <meta name="robots" content="noindex, nofollow" />

    <!-- No cache (important for auth pages) -->
    <meta
      http-equiv="Cache-Control"
      content="no-store, no-cache, must-revalidate"
    />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />

    <!-- Favicon -->
    <link
      rel="icon"
      href="https://i.ibb.co/JRJ2Dv9W/BR30-LOGO.jpg"
      type="image/png"
    />

    <!-- Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap"
      rel="stylesheet"
    />

    <!-- Icons -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />

    <!-- Styles -->
    <link rel="stylesheet" href="../assets/css/style.css" />

    <!-- SweetAlert -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11" defer></script>

    <!-- Config -->
    <script src="../assets/js/config.js"></script>

    <!-- Open Graph (optional UI only) -->
    <meta property="og:title" content="Reset Password | BR30 Kart" />
    <meta
      property="og:description"
      content="Securely reset your BR30 Kart account password."
    />
    <meta
      property="og:image"
      content="https://i.ibb.co/JRJ2Dv9W/BR30-LOGO.jpg"
    />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="BR30 Kart" />

    <style>
      /* =========================================
           GLOBAL & BODY STYLES (Dark Theme)
        ========================================= */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Poppins", sans-serif;
      }

      body {
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background-color: #050505;
        /* Aapka Body Color */
        padding: 20px;
      }

      /* =========================================
           CONTAINER (Responsive & Dark)
        ========================================= */
      .container {
        width: 100%;
        max-width: 360px;
        background: #1e293b;
        /* Card Background */
        padding: 30px;
        border-radius: 20px;
        border: 1px solid #334155;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
        text-align: center;
      }

      h2 {
        color: #ffffff;
        /* White Text */
        margin-bottom: 25px;
        font-weight: 600;
      }

      /* Input Styling */
      input {
        width: 100%;
        padding: 12px 15px;
        margin-bottom: 15px;
        border-radius: 10px;
        border: 1px solid #334155;
        background: #050505;
        /* Input background matches body */
        color: white;
        outline: none;
        transition: 0.3s;
        font-size: 14px;
      }

      input:focus {
        border-color: #a020f0;
        /* Purple Focus */
        box-shadow: 0 0 8px rgba(160, 32, 240, 0.2);
      }

      /* Purple Button */
      button {
        width: 100%;
        padding: 12px;
        border: none;
        border-radius: 10px;
        background: #a020f0;
        /* Brand Purple */
        color: white;
        cursor: pointer;
        transition: 0.3s ease;
        font-weight: 600;
        font-size: 16px;
        margin-top: 5px;
      }

      button:hover {
        background: #8219c4;
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(160, 32, 240, 0.3);
      }

      /* Footer Link */
      .links {
        margin-top: 20px;
      }

      .links a {
        text-decoration: none;
        color: #a020f0;
        /* Purple Link */
        font-size: 14px;
        font-weight: 500;
      }

      .links a:hover {
        text-decoration: underline;
      }

      /* Mobile Adjustment */
      @media (max-width: 480px) {
        .container {
          padding: 25px 20px;
        }

        h2 {
          font-size: 20px;
        }
      }
    </style>
  </head>

  <body>
    <!-- ✅ GTM noscript -->
    <noscript>
      <iframe
        src="https://www.googletagmanager.com/ns.html?id=GTM-TT7SLZ4L"
        height="0"
        width="0"
        style="display: none; visibility: hidden"
      ></iframe>
    </noscript>
    <div class="container">
      <h2 class="login-heading">Reset Password</h2>

      <!-- Browser signal ke liye FORM tag zaroori hai -->
      <form id="resetForm" onsubmit="resetPassword(event)">
        <label>Registered Email</label>
        <div class="input-box">
          <!-- name="email" aur autocomplete="username" Google ko hint deta hai -->
          <input
            id="email"
            name="email"
            type="email"
            placeholder="example@mail.com"
            autocomplete="username"
            required
          />
        </div>

        <label>Reset OTP/Token</label>
        <div class="input-box">
          <input
            id="token"
            name="token"
            type="text"
            placeholder="Enter 6-digit OTP"
            required
          />
        </div>

        <label>New Password</label>
        <div class="input-box">
          <!-- autocomplete="new-password" se 'Save/Update Password' ka prompt aata hai -->
          <input
            id="newPassword"
            name="password"
            type="password"
            placeholder="8+ chars, 1 Special"
            autocomplete="new-password"
            required
          />
        </div>

        <!-- Button type submit hona chahiye -->
        <button type="submit" id="resetBtn">Update Password</button>
      </form>

      <div class="links">
        <a href="login.html">Back to Login</a>
      </div>
    </div>

    <script src="../js/config.js"></script>

    <script>
      // event parameter added to handle form submission signal properly
      async function resetPassword(event) {
        if (event) event.preventDefault();

        const email = document.getElementById("email").value.trim();
        const token = document.getElementById("token").value.trim();
        const newPassword = document.getElementById("newPassword").value;
        const btn = document.getElementById("resetBtn");

        // 1. Basic Validation
        if (!email || !token || !newPassword) {
          return Swal.fire({
            icon: "warning",
            title: "Missing Details",
            text: "Please fill in all the required fields to reset your password.",
            background: "#111827",
            color: "#fff",
          });
        }

        // 2. Strength Check
        const passRegex =
          /^(?=.*[0-9])(?=.*[!@#$%^&*])[a-zA-Z0-9!@#$%^&*]{8,}$/;
        if (!passRegex.test(newPassword)) {
          return Swal.fire({
            icon: "error",
            title: "Weak Password",
            text: "Password must be at least 8 characters long and include a number and a special character.",
            background: "#111827",
            color: "#fff",
          });
        }

        try {
          // UI Loading State
          btn.innerText = "Updating... ⏳";
          btn.disabled = true;

          Swal.fire({
            title: "Processing...",
            text: "Updating your security credentials.",
            allowOutsideClick: false,
            background: "#111827",
            color: "#fff",
            didOpen: () => {
              Swal.showLoading();
            },
          });

          const res = await fetch(
            window.API_BASE_URL + "/api/auth/reset-password",
            {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ email, token, newPassword }),
            },
          );

          const data = await res.json();

          if (res.ok) {
            // 3. Success Message
            await Swal.fire({
              icon: "success",
              title: "Password Updated! 🚀",
              text: "Your password has been changed successfully. Redirecting to login...",
              background: "#111827",
              color: "#fff",
              timer: 2000,
              showConfirmButton: false,
            });

            // Redirect to login page
            window.location.href = "login.html";
          } else {
            throw new Error(
              data.msg ||
                data.message ||
                "Invalid OTP or Email verification failed.",
            );
          }
        } catch (err) {
          console.error("Reset Error:", err);

          // 4. Error Message
          Swal.fire({
            icon: "error",
            title: "Reset Failed",
            text:
              err.message || "Server connection error. Please try again later.",
            background: "#111827",
            color: "#fff",
            confirmButtonColor: "#d33",
          });

          btn.innerText = "Update Password";
          btn.disabled = false;
        }
      }

      // Enter key support
      document.addEventListener("keypress", (e) => {
        if (e.key === "Enter") {
          const activeElem = document.activeElement;
          // Check if user is in any of the reset fields
          if (
            activeElem.id === "email" ||
            activeElem.id === "token" ||
            activeElem.id === "newPassword"
          ) {
            resetPassword();
          }
        }
      });
    </script>

    <script src="/js/security.js"></script>
  </body>
</html>
