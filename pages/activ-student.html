    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BR30 | Active Seller Tracker</title>
    <meta name="robots" content="noindex, nofollow" />
    <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <link rel="stylesheet" href="../assets/css/activ-student.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11" defer></script>
    <meta property="og:title" content="Seller KYC Documents | BR30 Kart" />
    <meta property="og:description" content="Secure seller identity verification documents panel for BR30 Kart admin." />
    <meta property="og:image" content="https://i.ibb.co/KxnQc4gx/BR30-LOGO1.png" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="BR30 Kart" />
  </head>
  <body>
    <!-- Google Tag Manager (noscript) -->
    <noscript>
      <iframe src="https://www.googletagmanager.com/ns.html?id=GTM-5CDWCQ5S" height="0" width="0" style="display: none; visibility: hidden"></iframe>
    </noscript>
    <!-- End Google Tag Manager (noscript) -->
    <div class="admin-header">
      <div class="logo">
        BR30
        <span>ADMIN</span>
      </div>
      <div class="search-box">
        <i class="fas fa-search"></i>
        <input type="text" id="searchInput" placeholder="Search seller by name or email..." onkeyup="searchSeller()" />
      </div>
      <button onclick="clearSearch()" style="background: #2d333b; border: 1px solid #3d444d; color: white; width: 38px; height: 38px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center">
        <i class="fas fa-sync-alt"></i>
      </button>
      <a href="admin-dashboard.html" class="btn-back">
        <i class="fas fa-arrow-left"></i>
        Back to Dashboard
      </a>
    </div>
    <div class="table-section">
      <div class="table-header">
        <h2 style="margin: 0; color: #00ff88; font-size: 18px">Student Activity Tracker 🚀</h2>
      </div>
      <div class="scroll-container">
        <table>
          <thead>
            <tr>
              <th>Student Detail</th>
              <th>Last Active</th>
              <th>Courses Bought</th>
              <th>View Inventory 📚</th>
              <th>Status</th>
              <th>Quick Actions</th>
            </tr>
          </thead>
          <tbody id="studentTrackerBody"></tbody>
        </table>
      </div>
      <div id="noData" class="status-msg" style="display: none">
        <i class="fas fa-user-slash fa-2x"></i>
        <br />
        Koi active student nahi mila.
      </div>
    </div>
    <div id="alertModal" class="modal" style="display: none">
      <div class="modal-box">
        <h3>Send Elite Alert 📧</h3>
        <p id="alertUserEmail" style="color: #00ff88; font-size: 12px; margin-bottom: 10px"></p>
        <div class="input-group">
          <textarea id="alertMessage" placeholder="Bhai, kya message bhejna hai? (e.g. Upload more courses)"></textarea>
        </div>
        <div class="btns">
          <button onclick="closeAlertModal()" id="cancel">Cancel</button>
          <button onclick="confirmSendAlert()" id="sendBtn" style="background: #00ff88; color: #000">Send Alert Now</button>
        </div>
      </div>
    </div>
    <script src="../js/config.js"></script>
    <script src="../js/student-tracker.js"></script>
  </body>
</html>
